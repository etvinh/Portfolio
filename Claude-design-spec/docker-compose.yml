# Local Postgres for Brick Voyage (dev + test databases).
#   npm run db:up      -> start
#   npm run db:reset   -> wipe volume and recreate
# Connection strings live in .env (see .env.example).

services:
  db:
    image: postgres:16
    container_name: brickvoyage-db
    environment:
      POSTGRES_USER: brick
      POSTGRES_PASSWORD: brick
      POSTGRES_DB: brickvoyage
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Run on first boot of an empty volume, in this order (lexical):
      #   01 → DB + extensions, 02 → tables/indexes, 03 → sample rows.
      - ./db/database.sql:/docker-entrypoint-initdb.d/01-database.sql:ro
      - ./db/schema.sql:/docker-entrypoint-initdb.d/02-schema.sql:ro
      - ./db/data.sql:/docker-entrypoint-initdb.d/03-data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brick -d brickvoyage"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/xml application/rss+xml;
    gzip_min_length 1024;

    # ---- HTTP -> HTTPS redirect ----
    server {
        listen 80 default_server;
        server_name ethanvinh.dev www.ethanvinh.dev;
        return 301 https://$host$request_uri;
    }

    # ---- HTTPS (terminates Cloudflare Origin Cert) ----
    server {
        listen 443 ssl;
        http2  on;
        server_name ethanvinh.dev www.ethanvinh.dev;

        ssl_certificate     /etc/ssl/ethanvinh.dev/origin.crt;
        ssl_certificate_key /etc/ssl/ethanvinh.dev/origin.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;

        # Proxy everything to Next.js
        location / {
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;

            # Forwarded headers — Next.js / the app reconstruct the original
            # request from these (browser hit Cloudflare on HTTPS, Cloudflare
            # hit us on HTTPS, we forward to Next.js on HTTP).
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;

            # WebSocket / HMR upgrade (harmless in prod, useful one day)
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_read_timeout 60s;
        }
    }
}
